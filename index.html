<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONSOLIDATE // The E-Business Portfolio</title>
    <!-- Tailwind CSS Engine -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        serif: ['Playfair Display', 'Didot', 'Georgia', 'serif'],
                        sans: ['Montserrat', 'Inter', 'sans-serif']
                    },
                    colors: {
                        vogueBlack: '#0a0a0a',
                        vogueGold: '#d4af37'
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #0a0a0a;
            color: #f5f5f5;
            min-height: 100vh;
            letter-spacing: 0.03em;
        }
        /* Refined Editorial Glassmorphism */
        .editorial-panel {
            background: rgba(18, 18, 18, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }
        .vogue-card {
            background: rgba(20, 20, 20, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            transition: all 0.6s cubic-bezier(0.25, 1, 0.5, 1);
        }
        .vogue-card:hover {
            background: rgba(255, 255, 255, 0.02);
            border-color: rgba(255, 255, 255, 0.3);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.8);
        }
        /* Custom dynamic underlining */
        .hover-line::after {
            content: '';
            position: absolute;
            width: 100%;
            transform: scaleX(0);
            height: 1px;
            bottom: -2px;
            left: 0;
            background-color: #ffffff;
            transform-origin: bottom right;
            transition: transform 0.4s ease-out;
        }
        .vogue-card:hover .hover-line::after {
            transform: scaleX(1);
            transform-origin: bottom left;
        }
    </style>
    <!-- Premium Font Integration -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
</head>
<body class="font-sans antialiased">

    <!-- Top Editorial Masthead & Navigation -->
    <header class="editorial-panel sticky top-0 z-40 w-full tracking-wider">
        <div class="max-w-7xl mx-auto px-6 py-6 flex flex-col sm:flex-row justify-between items-center gap-4">
            <div class="text-center sm:text-left">
                <p class="text-[9px] font-semibold tracking-[0.4em] text-gray-400 uppercase mb-1">GLOBAL CORPORATE INTELLIGENCE BRIEFING</p>
                <h1 class="text-3xl font-serif tracking-[0.15em] font-bold text-white">CONSOLIDATE</h1>
            </div>
            <div class="flex items-center gap-6">
                <div id="date-badge" class="text-[10px] font-medium tracking-[0.2em] text-gray-400 font-sans border-r border-white/20 pr-6 uppercase">
                    LOADING PORTFOLIO...
                </div>
                <button id="config-btn" class="text-[10px] font-semibold tracking-[0.2em] uppercase text-white hover:text-gray-400 transition duration-300 flex items-center gap-2" title="Configure Groq API Token">
                    <span>Groq Settings</span>
                    <span class="text-xs">⚙️</span>
                </button>
            </div>
        </div>
    </header>

    <!-- Main Dynamic Layout Canvas -->
    <main class="max-w-7xl mx-auto px-6 py-12">
        <div id="magazine-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-x-6 gap-y-12">
            <!-- Dynamic Injection Slot (16 Vogue-style Interactive Cards) -->
        </div>
    </main>

    <!-- Configuration Modal Interface -->
    <div id="setup-modal" class="fixed inset-0 bg-black/90 backdrop-blur-lg hidden flex items-center justify-center p-4 z-50">
        <div class="bg-vogueBlack rounded-none max-w-md w-full p-8 border border-white/20 shadow-2xl">
            <h3 class="text-xl font-serif tracking-wider mb-2 text-white text-center">Groq API Profile</h3>
            <p class="text-xs text-gray-400 mb-6 leading-relaxed text-center font-light">Enter your private Groq authorization token. If unavailable or invalid, we will render a curated dummy portfolio.</p>
            <input type="password" id="api-key-input" placeholder="gsk_..." class="w-full p-3 rounded-none bg-zinc-900 border border-white/10 text-white font-mono tracking-widest focus:outline-none focus:border-white/40 mb-6 text-sm">
            <div class="flex justify-center gap-4">
                <button id="close-modal-btn" class="px-6 py-2.5 text-xs tracking-widest uppercase text-gray-400 hover:text-white transition font-light">Discard</button>
                <button id="save-key-btn" class="px-6 py-2.5 bg-white text-black hover:bg-zinc-200 text-xs tracking-widest uppercase font-semibold transition">Authenticate</button>
            </div>
        </div>
    </div>

    <!-- Application Architecture Core Script -->
    <script>
        const GROQ_API_ENDPOINT = "https://api.groq.com/openai/v1/chat/completions";
        const CATEGORIES = [
            "Business", "Entrepreneurship", "Finance", "Economics", 
            "Corporate Innovation", "Leadership", "Marketing", "Future Enterprises"
        ];

        const DUMMY_ARTICLES = [
            { category: "Business", title: "Global Conglomerates Reprice Operating Playbooks", summary: "Boardrooms are redirecting capital from pure expansion to resilience architecture, prioritizing supply optionality and margin durability over short-cycle headline growth.", metric: "OPERATING MARGIN +2.1%", geography: "GLOBAL" },
            { category: "Business", title: "Middle-Market Rollups Enter Precision Phase", summary: "Acquirers are shifting from scale-at-all-costs strategies to integration discipline, with diligence weighted toward data quality, retention economics, and execution velocity.", metric: "$3.8B DEAL PIPELINE", geography: "NEW YORK" },
            { category: "Entrepreneurship", title: "Founder-Led Firms Extend Cash Runway Horizons", summary: "Early-stage operators are normalizing scenario-based planning and staged hiring, producing leaner organizations with clearer unit-level accountability.", metric: "RUNWAY +7 MONTHS", geography: "SAN FRANCISCO" },
            { category: "Entrepreneurship", title: "Micro-Vertical Startups Capture Niche Demand", summary: "Specialist ventures are outperforming broad platforms in select categories by combining focused products with domain-native distribution loops.", metric: "RETENTION INDEX 8.9", geography: "LONDON" },
            { category: "Finance", title: "Credit Markets Reward Cash-Flow Certainty", summary: "Lenders are offering improved terms to issuers with transparent earnings quality, while cyclical borrowers face elevated scrutiny on forward guidance.", metric: "SPREAD TIGHTENING 42 BPS", geography: "CHICAGO" },
            { category: "Finance", title: "Treasury Teams Rebalance Duration Exposure", summary: "Corporate treasury desks are rotating into layered maturity ladders to stabilize liquidity while preserving optionality against policy volatility.", metric: "LIQUIDITY COVER 1.6x", geography: "TOKYO" },
            { category: "Economics", title: "Services Activity Offsets Manufacturing Softness", summary: "Economic momentum remains uneven, with consumer-facing services supporting topline demand even as industrial output experiences selective cooling.", metric: "SERVICES PMI 53.4", geography: "GLOBAL" },
            { category: "Economics", title: "Labor Reallocation Signals Productivity Upside", summary: "Workforce migration toward digital and analytical roles is creating near-term transition costs but a stronger medium-term productivity profile.", metric: "PRODUCTIVITY +1.8%", geography: "WASHINGTON" },
            { category: "Corporate Innovation", title: "AI Governance Moves from Policy to Practice", summary: "Enterprises are operationalizing model risk controls through approval checkpoints, audit trails, and measurable impact frameworks tied to business outcomes.", metric: "DEPLOYMENT CYCLE -28%", geography: "SINGAPORE" },
            { category: "Corporate Innovation", title: "Automation Budgets Shift to Workflow Orchestration", summary: "Technology investment is consolidating around integrated orchestration layers that reduce handoffs and compress decision latency across functions.", metric: "PROCESS TIME -34%", geography: "BERLIN" },
            { category: "Leadership", title: "Executive Teams Adopt Scenario-Led Operating Cadence", summary: "Leadership groups are institutionalizing quarterly scenario drills to align risk posture, strategic pivots, and communication protocols.", metric: "STRATEGY CONFIDENCE +19%", geography: "GLOBAL" },
            { category: "Leadership", title: "Performance Culture Centers on Decision Transparency", summary: "Organizations with explicit decision logs and accountability rituals report improved cross-functional trust and faster execution at scale.", metric: "EXECUTION VELOCITY +22%", geography: "TORONTO" },
            { category: "Marketing", title: "Brand Spend Favors Measurable Narrative Systems", summary: "CMOs are integrating creative and analytics into unified narrative systems that improve attribution confidence without sacrificing brand distinctiveness.", metric: "CAC -11%", geography: "LOS ANGELES" },
            { category: "Marketing", title: "B2B Demand Programs Prioritize Intent Precision", summary: "Teams are tightening funnel design around high-intent segments, reducing noise and improving conversion consistency in extended buying cycles.", metric: "SQL RATE +17%", geography: "DUBLIN" },
            { category: "Future Enterprises", title: "Distributed Operating Models Mature Beyond Experiment", summary: "Hybrid-first enterprises are standardizing asynchronous workflows, enabling broader talent access while improving continuity across time zones.", metric: "OUTPUT PER FTE +13%", geography: "GLOBAL" },
            { category: "Future Enterprises", title: "Sustainable Infrastructure Becomes Strategic Constraint", summary: "Energy-aware compute and logistics planning are moving into core strategy as firms model environmental constraints into long-range capex roadmaps.", metric: "ENERGY INTENSITY -9%", geography: "SHANGHAI" }
        ];

        document.addEventListener("DOMContentLoaded", () => {
            initializeLayoutBadges();
            bindEventTriggers();
            evaluateBriefingLifecycle();
        });

        function initializeLayoutBadges() {
            const timeFormattingOptions = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById('date-badge').innerText = new Date().toLocaleDateString('en-US', timeFormattingOptions).toUpperCase();
        }

        function bindEventTriggers() {
            document.getElementById('config-btn').addEventListener('click', () => toggleSetupOverlay(true));
            document.getElementById('close-modal-btn').addEventListener('click', () => toggleSetupOverlay(false));
            document.getElementById('save-key-btn').addEventListener('click', saveConfiguredToken);
        }

        function toggleSetupOverlay(shouldShow) {
            const modalElement = document.getElementById('setup-modal');
            if (shouldShow) {
                modalElement.classList.remove('hidden');
                const existingKey = localStorage.getItem('groq_magazine_key');
                if (existingKey) document.getElementById('api-key-input').value = existingKey;
            } else {
                modalElement.classList.add('hidden');
            }
        }

        function saveConfiguredToken() {
            const tokenInput = document.getElementById('api-key-input').value.trim();
            if (tokenInput) {
                localStorage.setItem('groq_magazine_key', tokenInput);
                localStorage.removeItem('cached_vogue_payload'); // Evict data caches
                toggleSetupOverlay(false);
                evaluateBriefingLifecycle();
            }
        }

        function evaluateBriefingLifecycle() {
            const storedCache = localStorage.getItem('cached_vogue_payload');
            const validationStamp = localStorage.getItem('cached_vogue_date');
            const currentSystemDateString = new Date().toDateString();

            if (storedCache && validationStamp === currentSystemDateString) {
                renderDynamicMagazineCards(JSON.parse(storedCache));
            } else {
                invokeAutonomousAgentSync();
            }
        }

        async function invokeAutonomousAgentSync() {
            const internalToken = localStorage.getItem('groq_magazine_key');
            if (!internalToken) {
                useDummyPortfolio("Missing API key. Rendering dummy data.");
                return;
            }

            renderPulsePlaceholders();

            const synthesisPrompt = `You are an elite editorial economic editor compiling a layout for a premium, high-fashion stylized business journal. Today's date context is ${new Date().toDateString()}.
            Generate exactly 16 ultra-premium executive industry briefings. 
            Provide exactly 2 discrete articles for each of these 8 exact tracks: ${CATEGORIES.join(', ')}.
            
            Return the content output strictly as a raw minified valid JSON array string. No markdown frames, no backticks, no wrap text. Schema format:
            [
              {
                "category": "Category Name",
                "title": "A Punchy, Elegant Headline",
                "summary": "A sophisticated, high-level analysis written with narrative grace detailing the market force and systemic ripple effects.",
                "metric": "Key statistical index (e.g., VALUATION UP 14%, $4.2B M&A, or SHIFT INDEX 9.4)",
                "geography": "LONDON / NEW YORK / TOKYO / SHANGHAI / GLOBAL"
              }
            ]`;

            try {
                const networkRequest = await fetch(GROQ_API_ENDPOINT, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${internalToken}`
                    },
                    body: JSON.stringify({
                        model: "llama-3.1-8b-instant",
                        messages: [
                            { role: "system", content: "You output raw minified plain JSON string matching schemas exactly. No prose wrap, no markdown fences." },
                            { role: "user", content: synthesisPrompt }
                        ],
                        temperature: 0.3
                    })
                });

                if (!networkRequest.ok) throw new Error('API Sync Execution Aborted');
                
                const responseData = await networkRequest.json();
                let sanitizedJsonText = responseData.choices[0].message.content.trim();
                
                // Handle potential object wrapping if Groq nests the array inside an implicit parent object
                let validatedPayload = JSON.parse(sanitizedJsonText);
                if (!Array.isArray(validatedPayload) && validatedPayload.articles) {
                    validatedPayload = validatedPayload.articles;
                } else if (!Array.isArray(validatedPayload) && Object.values(validatedPayload)[0]) {
                    const fallbackValue = Object.values(validatedPayload)[0];
                    if (Array.isArray(fallbackValue)) validatedPayload = fallbackValue;
                }

                if (!Array.isArray(validatedPayload) || validatedPayload.length === 0) {
                    throw new Error('API returned an invalid or empty payload.');
                }
                
                localStorage.setItem('cached_vogue_payload', JSON.stringify(validatedPayload));
                localStorage.setItem('cached_vogue_date', new Date().toDateString());
                
                renderDynamicMagazineCards(validatedPayload);
            } catch (networkError) {
                console.error(networkError);
                useDummyPortfolio("API call failed. Rendering dummy data.");
            }
        }

        function useDummyPortfolio(reason = "Fallback to dummy data.") {
            console.warn(reason);
            const payload = DUMMY_ARTICLES.slice();
            localStorage.setItem('cached_vogue_payload', JSON.stringify(payload));
            localStorage.setItem('cached_vogue_date', new Date().toDateString());
            renderDynamicMagazineCards(payload);
        }

        function renderDynamicMagazineCards(articlesArray) {
            const interfaceGrid = document.getElementById('magazine-grid');
            interfaceGrid.innerHTML = ''; 

            if (!Array.isArray(articlesArray)) {
                displayExecutionErrorState();
                return;
            }

            articlesArray.forEach(article => {
                const searchIntelQuery = encodeURIComponent(`${article.category} ${article.title}`);
                const searchHyperlink = `https://www.google.com/search?q=${searchIntelQuery}`;

                interfaceGrid.innerHTML += `
                    <a href="${searchHyperlink}" target="_blank" rel="noopener noreferrer" class="vogue-card block p-6 relative flex flex-col justify-between group cursor-pointer border-t-[3px] border-white/20 hover:border-white/70">
                        <div>
                            <div class="flex justify-between items-center mb-6">
                                <span class="text-[9px] font-bold tracking-[0.25em] text-gray-400 uppercase">${article.category}</span>
                                <span class="text-[9px] font-light tracking-widest text-zinc-500 uppercase">${article.geography}</span>
                            </div>
                            
                            <h2 class="text-xl font-serif font-semibold text-white tracking-wide leading-tight mb-4 group-hover:text-zinc-300 transition-colors relative inline-block">
                                <span class="hover-line relative">${article.title}</span>
                            </h2>
                            
                            <p class="text-xs text-zinc-400 font-light leading-relaxed mb-8 tracking-wide text-justify">${article.summary}</p>
                        </div>
                        
                        <div class="pt-4 border-t border-white/5 flex justify-between items-center mt-auto">
                            <span class="text-[9px] font-medium tracking-[0.2em] text-white/60 uppercase font-sans">${article.metric}</span>
                            <span class="text-[9px] font-semibold tracking-widest uppercase text-zinc-400 group-hover:text-white transition-colors duration-300 flex items-center gap-1.5">
                                READ ANALYSIS <span class="text-xs transition-transform duration-300 group-hover:translate-x-1">→</span>
                            </span>
                        </div>
                    </a>
                `;
            });
        }

        function renderPulsePlaceholders() {
            const interfaceGrid = document.getElementById('magazine-grid');
            interfaceGrid.innerHTML = '';
            for (let idx = 0; idx < 16; idx++) {
                interfaceGrid.innerHTML += `
                    <div class="vogue-card p-6 h-72 animate-pulse flex flex-col justify-between">
                        <div>
                            <div class="flex justify-between items-center mb-6">
                                <div class="h-2 w-1/3 bg-zinc-800 rounded"></div>
                                <div class="h-2 w-1/6 bg-zinc-900 rounded"></div>
                            </div>
                            <div class="h-5 w-5/6 bg-zinc-800 rounded mb-4"></div>
                            <div class="h-2.5 w-full bg-zinc-900 rounded mb-2"></div>
                            <div class="h-2.5 w-4/5 bg-zinc-900 rounded"></div>
                        </div>
                        <div class="h-2 w-1/4 bg-zinc-800 rounded"></div>
                    </div>
                `;
            }
        }

        function displayMissingConfigurationState() {
            document.getElementById('magazine-grid').innerHTML = `
                <div class="col-span-full py-32 text-center border border-dashed border-zinc-800">
                    <p class="text-xs font-light tracking-[0.3em] text-zinc-400 uppercase">AUTHENTICATION REQUIRED // PROVISION GROQ ENGINE TO COMPILE PORTFOLIO</p>
                </div>
            `;
        }

        function displayExecutionErrorState() {
            document.getElementById('magazine-grid').innerHTML = `
                <div class="col-span-full py-32 text-center border border-dashed border-red-900/30">
                    <p class="text-xs font-light tracking-[0.2em] text-red-400 uppercase">VERIFICATION ROUTINE INTERRUPTED // CONFIRM EXPERIMENTAL TOKEN INTEGRITY</p>
                </div>
            `;
        }
    </script>
</body>
</html>
